model:
  name: "your-base-model"
  params: 70000000000

data:
  tokens: 500000000000
  sources:
    - public_text
    - licensed_code
    - synthetic_reasoning
  filtering:
    dedup: true
    pii_filter: true
    unsafe_filter: true

training:
  batch_size: 1024
  seq_len: 8192
  optimizer: adamw
  lr: 1.5e-4
  warmup_steps: 2000
  checkpoint_every_steps: 1000
